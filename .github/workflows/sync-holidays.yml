name: Sync Holidays Data

on:
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab
  repository_dispatch:
    types: [sync_holidays]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Run Holidays Sync Script
      run: node scripts/sync-holidays.js

    - name: Sync D1 Database
      if: hashFiles('scripts/temp_sync.sql') != ''
      run: |
        chmod +x node_modules/.bin/wrangler
        npx wrangler d1 execute kalender-db --remote --file scripts/temp_sync.sql
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy to Cloudflare Pages
      if: hashFiles('scripts/temp_sync.sql') != ''
      run: |
        chmod +x node_modules/.bin/wrangler
        npx wrangler pages deploy . --project-name=kalender-id --branch production --commit-message "Auto-update holidays data"
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Commit and Push local JSON changes
      if: hashFiles('scripts/temp_sync.sql') != ''
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/
        git commit -m "Auto-update holidays JSON files"
        git push
      shell: bash

    - name: Clean up temporary files
      run: |
        rm -f scripts/temp_sync.sql
